<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockWatch — History</title>

  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:           #090e14;
      --surface:      #0d1520;
      --surface-2:    #111d2e;
      --border:       #1a2840;
      --accent:       #00d084;
      --accent-dim:   rgba(0,208,132,0.1);
      --danger:       #ff4d6a;
      --danger-dim:   rgba(255,77,106,0.1);
      --text:         #e8f0fe;
      --text-muted:   #5a7498;
      --font-display: 'Syne', sans-serif;
      --font-mono:    'DM Mono', monospace;
      --sidebar:      220px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; display: flex; }

    /* ── SIDEBAR ── */
    .sidebar { width: var(--sidebar); min-height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 12px; position: fixed; top: 0; left: 0; }
    .logo { display: flex; align-items: center; gap: 10px; padding: 8px 10px; margin-bottom: 28px; }
    .logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 16px; height: 16px; fill: var(--bg); }
    .logo-text { font-family: var(--font-display); font-weight: 800; font-size: 17px; }
    .logo-text span { color: var(--accent); }
    .nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 0 10px; margin: 20px 0 6px; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; color: var(--text-muted); text-decoration: none; font-size: 13px; transition: all 0.15s; margin-bottom: 2px; }
    .nav-link svg { width: 17px; height: 17px; flex-shrink: 0; }
    .nav-link:hover { background: var(--surface-2); color: var(--text); }
    .nav-link.active { background: var(--accent-dim); color: var(--accent); }
    .sidebar-bottom { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }
    .btn-logout { width: 100%; display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; background: transparent; border: none; color: var(--text-muted); font-family: var(--font-mono); font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .btn-logout:hover { background: var(--danger-dim); color: var(--danger); }
    .btn-logout svg { width: 17px; height: 17px; }

    /* ── MAIN ── */
    .main { margin-left: var(--sidebar); flex: 1; padding: 32px; padding-bottom: 60px; animation: fadeIn 0.4s ease both; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .page-header h1 { font-family: var(--font-display); font-weight: 800; font-size: 26px; letter-spacing: -0.5px; }

    /* ── FILTER BUTTONS ── */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .filter-btn {
      padding: 8px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* ── STATS ROW ── */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }

    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 22px; }
    .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px; }
    .stat-value { font-family: var(--font-display); font-weight: 800; font-size: 26px; letter-spacing: -1px; }
    .stat-value.green { color: var(--accent); }
    .stat-value.red   { color: var(--danger); }

    /* ── TRANSACTION TABLE ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }

    .card-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 20px; border-bottom: 1px solid var(--border); }
    .card-title { font-family: var(--font-display); font-weight: 700; font-size: 14px; }

    table { width: 100%; border-collapse: collapse; }

    th { text-align: left; font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 12px 20px; border-bottom: 1px solid var(--border); font-weight: 500; }
    th:last-child { text-align: right; }

    td { padding: 16px 20px; font-size: 13px; border-bottom: 1px solid rgba(26,40,64,0.4); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface-2); }
    td:last-child { text-align: right; }

    /* Buy / Sell badge */
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.buy  { background: var(--accent-dim); color: var(--accent); }
    .badge.sell { background: var(--danger-dim);  color: var(--danger); }

    .sym { font-family: var(--font-display); font-weight: 700; font-size: 14px; }
    .green { color: var(--accent); }
    .red   { color: var(--danger); }

    /* Empty state */
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }
    .empty a { display: inline-block; margin-top: 12px; padding: 8px 18px; background: var(--accent); color: var(--bg); border-radius: 8px; font-family: var(--font-display); font-weight: 700; font-size: 13px; text-decoration: none; }

    /* ── TICKER ── */
    .ticker-bar { position: fixed; bottom: 0; left: var(--sidebar); right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 7px 0; overflow: hidden; z-index: 50; }
    .ticker-track { display: flex; gap: 36px; animation: ticker 30s linear infinite; width: max-content; }

    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .ticker-item { display: flex; align-items: center; gap: 8px; font-size: 12px; white-space: nowrap; color: var(--text-muted); }
    .ticker-item .sym { font-family: var(--font-display); font-weight: 700; color: var(--text); }
  </style>
</head>
<body>

  <!-- ── SIDEBAR ── -->
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="8" width="4" height="10" rx="1"/><rect x="10" y="4" width="4" height="14" rx="1"/><rect x="17" y="6" width="4" height="9" rx="1"/><rect x="4.5" y="4" width="1" height="5"/><rect x="4.5" y="17" width="1" height="4"/><rect x="11.5" y="1" width="1" height="4"/><rect x="11.5" y="17" width="1" height="4"/><rect x="18.5" y="3" width="1" height="4"/><rect x="18.5" y="14" width="1" height="4"/></svg>
      </div>
      <div class="logo-text">Stock<span>Watch</span></div>
    </div>

    <span class="nav-label">Main</span>
    <a href="dashboard.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="trade.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      Trade
    </a>
    <a href="history.html" class="nav-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      History
    </a>

    <span class="nav-label">Tools</span>
    <a href="news.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
      News
    </a>
    <a href="ai.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      AI Assistant
    </a>

    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="handleLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Log Out
      </button>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <main class="main">

    <div class="page-header">
      <h1>Transaction History</h1>
    </div>

    <!-- Summary stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Trades</div>
        <div class="stat-value" id="totalTrades">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Bought</div>
        <div class="stat-value green" id="totalBought">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Sold</div>
        <div class="stat-value red" id="totalSold">—</div>
      </div>
    </div>

    <!-- Filter buttons -->
    <div class="filters">
      <button class="filter-btn active" onclick="filterTransactions('all', this)">All</button>
      <button class="filter-btn" onclick="filterTransactions('buy', this)">Buys</button>
      <button class="filter-btn" onclick="filterTransactions('sell', this)">Sells</button>
    </div>

    <!-- Transactions table -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">All Transactions</span>
      </div>
      <div id="tableContainer"></div>
    </div>

  </main>

  <div class="ticker-bar">
    <div class="ticker-track" id="ticker"></div>
  </div>

  <script>
    let allTransactions = []; // store all transactions so we can filter without re-fetching

    requireAuth(async (user) => {
      // Fetch all transactions from Firestore, newest first
      const snapshot = await db
        .collection('users').doc(user.uid)
        .collection('transactions')
        .orderBy('timestamp', 'desc')
        .get();

      allTransactions = snapshot.docs.map(doc => doc.data());

      renderStats(allTransactions);
      renderTable(allTransactions);
    });

    // Calculate and display summary stats
    function renderStats(transactions) {
      const totalBought = transactions
        .filter(t => t.type === 'buy')
        .reduce((sum, t) => sum + t.total, 0);

      const totalSold = transactions
        .filter(t => t.type === 'sell')
        .reduce((sum, t) => sum + t.total, 0);

      document.getElementById('totalTrades').textContent = transactions.length;
      document.getElementById('totalBought').textContent = formatMoney(totalBought);
      document.getElementById('totalSold').textContent   = formatMoney(totalSold);
    }

    // Render the transactions table
    function renderTable(transactions) {
      const container = document.getElementById('tableContainer');

      if (transactions.length === 0) {
        container.innerHTML = `
          <div class="empty">
            No transactions yet.
            <br><a href="trade.html">Make your first trade →</a>
          </div>`;
        return;
      }

      const rows = transactions.map(t => {
        // Format the timestamp — Firestore timestamps have a .toDate() method
        const date = t.timestamp ? t.timestamp.toDate().toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric',
          hour: '2-digit', minute: '2-digit'
        }) : '—';

        const isBuy = t.type === 'buy';

        return `
          <tr>
            <td><span class="badge ${t.type}">${t.type}</span></td>
            <td><span class="sym">${t.symbol}</span></td>
            <td>${t.shares} share${t.shares > 1 ? 's' : ''}</td>
            <td>${formatMoney(t.price)}</td>
            <td class="${isBuy ? 'red' : 'green'}">${isBuy ? '-' : '+'}${formatMoney(t.total)}</td>
            <td style="color: var(--text-muted); font-size: 12px;">${date}</td>
          </tr>`;
      }).join('');

      container.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Type</th>
              <th>Symbol</th>
              <th>Shares</th>
              <th>Price</th>
              <th>Total</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    // Filter the table without re-fetching from Firestore
    function filterTransactions(type, btn) {
      // Update active button
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const filtered = type === 'all'
        ? allTransactions
        : allTransactions.filter(t => t.type === type);

      renderTable(filtered);
    }

    function formatMoney(n) {
      return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    async function handleLogout() {
      await auth.signOut();
      window.location.href = 'auth.html';
    }

    // Static ticker
    const tickers = [
      { sym: 'AAPL',  price: '213.49', change: '+1.24%', up: true  },
      { sym: 'TSLA',  price: '248.73', change: '-0.87%', up: false },
      { sym: 'GOOGL', price: '174.20', change: '+0.53%', up: true  },
      { sym: 'AMZN',  price: '198.11', change: '+2.10%', up: true  },
      { sym: 'MSFT',  price: '415.85', change: '-0.22%', up: false },
      { sym: 'NVDA',  price: '875.32', change: '+3.45%', up: true  },
    ];

    const makeItems = () => tickers.map(t => `
      <div class="ticker-item">
        <span class="sym">${t.sym}</span>
        <span>$${t.price}</span>
        <span class="${t.up ? 'green' : 'red'}">${t.change}</span>
      </div>`).join('');

    document.getElementById('ticker').innerHTML = makeItems() + makeItems();
  </script>

</body>
</html>
