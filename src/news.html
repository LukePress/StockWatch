<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StockWatch — News</title>

  <script src="config.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:           #090e14;
      --surface:      #0d1520;
      --surface-2:    #111d2e;
      --border:       #1a2840;
      --accent:       #00d084;
      --accent-dim:   rgba(0,208,132,0.1);
      --danger:       #ff4d6a;
      --danger-dim:   rgba(255,77,106,0.1);
      --text:         #e8f0fe;
      --text-muted:   #5a7498;
      --font-display: 'Syne', sans-serif;
      --font-mono:    'DM Mono', monospace;
      --sidebar:      220px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-mono); min-height: 100vh; display: flex; }

    /* ── SIDEBAR ── */
    .sidebar { width: var(--sidebar); min-height: 100vh; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 24px 12px; position: fixed; top: 0; left: 0; }
    .logo { display: flex; align-items: center; gap: 10px; padding: 8px 10px; margin-bottom: 28px; }
    .logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 16px; height: 16px; fill: var(--bg); }
    .logo-text { font-family: var(--font-display); font-weight: 800; font-size: 17px; }
    .logo-text span { color: var(--accent); }
    .nav-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 0 10px; margin: 20px 0 6px; }
    .nav-link { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; color: var(--text-muted); text-decoration: none; font-size: 13px; transition: all 0.15s; margin-bottom: 2px; }
    .nav-link svg { width: 17px; height: 17px; flex-shrink: 0; }
    .nav-link:hover { background: var(--surface-2); color: var(--text); }
    .nav-link.active { background: var(--accent-dim); color: var(--accent); }
    .sidebar-bottom { margin-top: auto; padding-top: 12px; border-top: 1px solid var(--border); }
    .btn-logout { width: 100%; display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; background: transparent; border: none; color: var(--text-muted); font-family: var(--font-mono); font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .btn-logout:hover { background: var(--danger-dim); color: var(--danger); }
    .btn-logout svg { width: 17px; height: 17px; }

    /* ── MAIN ── */
    .main { margin-left: var(--sidebar); flex: 1; padding: 32px; padding-bottom: 60px; animation: fadeIn 0.4s ease both; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
    .page-header h1 { font-family: var(--font-display); font-weight: 800; font-size: 26px; letter-spacing: -0.5px; }

    /* ── SEARCH ── */
    .search-wrap { display: flex; gap: 10px; margin-bottom: 24px; }

    .search-wrap input {
      flex: 1; padding: 13px 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: var(--font-mono); font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--text-muted); }

    .btn-search { padding: 13px 24px; background: var(--accent); color: var(--bg); border: none; border-radius: 10px; font-family: var(--font-display); font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s; }
    .btn-search:hover { background: #00e894; }
    .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── CATEGORY FILTERS ── */
    .filters { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }

    .filter-btn { padding: 8px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); font-family: var(--font-mono); font-size: 12px; cursor: pointer; transition: all 0.15s; }
    .filter-btn:hover { border-color: var(--accent); color: var(--text); }
    .filter-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

    /* ── NEWS GRID ── */
    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }

    /* Individual news card */
    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      transition: border-color 0.2s, transform 0.2s;
    }

    .news-card:hover { border-color: var(--accent); transform: translateY(-2px); }

    /* News image */
    .news-img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: var(--surface-2);
    }

    /* Placeholder when no image */
    .news-img-placeholder {
      width: 100%;
      height: 160px;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .news-img-placeholder svg { width: 32px; height: 32px; stroke: var(--border); fill: none; }

    .news-body { padding: 16px; flex: 1; display: flex; flex-direction: column; gap: 8px; }

    .news-source {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent);
      font-weight: 500;
    }

    .news-headline {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      line-height: 1.4;
      color: var(--text);
    }

    .news-summary {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .news-date { font-size: 11px; color: var(--text-muted); margin-top: auto; }

    /* Loading / empty state */
    .state-msg { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }

    /* ── TICKER ── */
    .ticker-bar { position: fixed; bottom: 0; left: var(--sidebar); right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 7px 0; overflow: hidden; z-index: 50; }
    .ticker-track { display: flex; gap: 36px; animation: ticker 30s linear infinite; width: max-content; }

    @keyframes ticker {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    .ticker-item { display: flex; align-items: center; gap: 8px; font-size: 12px; white-space: nowrap; color: var(--text-muted); }
    .ticker-item .sym { font-family: var(--font-display); font-weight: 700; color: var(--text); }
    .green { color: var(--accent); }
    .red   { color: var(--danger); }
  </style>
</head>
<body>

  <!-- ── SIDEBAR ── -->
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="8" width="4" height="10" rx="1"/><rect x="10" y="4" width="4" height="14" rx="1"/><rect x="17" y="6" width="4" height="9" rx="1"/><rect x="4.5" y="4" width="1" height="5"/><rect x="4.5" y="17" width="1" height="4"/><rect x="11.5" y="1" width="1" height="4"/><rect x="11.5" y="17" width="1" height="4"/><rect x="18.5" y="3" width="1" height="4"/><rect x="18.5" y="14" width="1" height="4"/></svg>
      </div>
      <div class="logo-text">Stock<span>Watch</span></div>
    </div>

    <span class="nav-label">Main</span>
    <a href="dashboard.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </a>
    <a href="trade.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
      Trade
    </a>
    <a href="history.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      History
    </a>

    <span class="nav-label">Tools</span>
    <a href="news.html" class="nav-link active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/></svg>
      News
    </a>
    <a href="ai.html" class="nav-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      AI Assistant
    </a>

    <div class="sidebar-bottom">
      <button class="btn-logout" onclick="handleLogout()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Log Out
      </button>
    </div>
  </nav>

  <!-- ── MAIN ── -->
  <main class="main">

    <div class="page-header">
      <h1>Financial News</h1>
    </div>

    <!-- Search by stock symbol or keyword -->
    <div class="search-wrap">
      <input id="searchInput" type="text" placeholder="Search by stock symbol or keyword (e.g. AAPL, inflation, Fed)"/>
      <button class="btn-search" id="searchBtn" onclick="fetchNews()">Search</button>
    </div>

    <!-- General category filters -->
    <div class="filters">
      <button class="filter-btn active" onclick="fetchGeneralNews('general', this)">General</button>
      <button class="filter-btn" onclick="fetchGeneralNews('forex', this)">Forex</button>
      <button class="filter-btn" onclick="fetchGeneralNews('crypto', this)">Crypto</button>
      <button class="filter-btn" onclick="fetchGeneralNews('merger', this)">Mergers</button>
    </div>

    <!-- News cards render here -->
    <div id="newsContainer">
      <div class="state-msg">Loading latest financial news...</div>
    </div>

  </main>

  <div class="ticker-bar">
    <div class="ticker-track" id="ticker"></div>
  </div>

  <script>
    // FINNHUB_KEY is loaded from config.js

    // Load general news on page load
    requireAuth(() => fetchGeneralNews('general'));

    // ── SEARCH BY SYMBOL OR KEYWORD ────────────────────────────
    // Finnhub's company-news endpoint returns news for a specific stock symbol.
    // We use today and 7 days ago as the date range.
    async function fetchNews() {
      const query = document.getElementById('searchInput').value.trim().toUpperCase();
      if (!query) return;

      const btn = document.getElementById('searchBtn');
      btn.textContent = 'Loading...';
      btn.disabled    = true;
      showLoading();

      // Date range: last 7 days
      const today = new Date();
      const week  = new Date(today - 7 * 24 * 60 * 60 * 1000);
      const from  = week.toISOString().split('T')[0];
      const to    = today.toISOString().split('T')[0];

      try {
        const res     = await fetch(`https://finnhub.io/api/v1/company-news?symbol=${query}&from=${from}&to=${to}&token=${FINNHUB_KEY}`);
        const articles = await res.json();

        if (!articles.length) {
          showEmpty(`No news found for "${query}" in the last 7 days.`);
          return;
        }

        renderNews(articles.slice(0, 20)); // cap at 20 articles
      } catch (err) {
        showEmpty('Failed to load news. Please try again.');
        console.error(err);
      } finally {
        btn.textContent = 'Search';
        btn.disabled    = false;
      }
    }

    // ── GENERAL MARKET NEWS BY CATEGORY ───────────────────────
    // Finnhub's market-news endpoint returns general financial news
    // Categories: general, forex, crypto, merger
    async function fetchGeneralNews(category, btn) {
      // Update active filter button if one was clicked
      if (btn) {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      }

      showLoading();

      try {
        const res      = await fetch(`https://finnhub.io/api/v1/news?category=${category}&token=${FINNHUB_KEY}`);
        const articles = await res.json();

        if (!articles.length) {
          showEmpty('No news available right now. Try again later.');
          return;
        }

        renderNews(articles.slice(0, 20));
      } catch (err) {
        showEmpty('Failed to load news. Please try again.');
        console.error(err);
      }
    }

    // Press Enter to search
    document.getElementById('searchInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') fetchNews();
    });

    // ── RENDER NEWS CARDS ──────────────────────────────────────
    function renderNews(articles) {
      const container = document.getElementById('newsContainer');

      container.innerHTML = `<div class="news-grid">${articles.map(a => {
        const date = new Date(a.datetime * 1000).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', year: 'numeric'
        });

        const img = a.image
          ? `<img class="news-img" src="${a.image}" alt="" onerror="this.parentElement.innerHTML='<div class=news-img-placeholder><svg viewBox=\'0 0 24 24\'><path d=\'M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2\'/></svg></div>'">`
          : `<div class="news-img-placeholder"><svg viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"/></svg></div>`;

        return `
          <a class="news-card" href="${a.url}" target="_blank" rel="noopener noreferrer">
            ${img}
            <div class="news-body">
              <div class="news-source">${a.source || 'Unknown'}</div>
              <div class="news-headline">${a.headline}</div>
              <div class="news-summary">${a.summary || ''}</div>
              <div class="news-date">${date}</div>
            </div>
          </a>`;
      }).join('')}</div>`;
    }

    // ── STATE HELPERS ──────────────────────────────────────────
    function showLoading() {
      document.getElementById('newsContainer').innerHTML = `<div class="state-msg">Loading news...</div>`;
    }

    function showEmpty(msg) {
      document.getElementById('newsContainer').innerHTML = `<div class="state-msg">${msg}</div>`;
    }

    async function handleLogout() {
      await auth.signOut();
      window.location.href = 'auth.html';
    }

    // Static ticker
    const tickers = [
      { sym: 'AAPL',  price: '213.49', change: '+1.24%', up: true  },
      { sym: 'TSLA',  price: '248.73', change: '-0.87%', up: false },
      { sym: 'GOOGL', price: '174.20', change: '+0.53%', up: true  },
      { sym: 'AMZN',  price: '198.11', change: '+2.10%', up: true  },
      { sym: 'MSFT',  price: '415.85', change: '-0.22%', up: false },
      { sym: 'NVDA',  price: '875.32', change: '+3.45%', up: true  },
    ];

    const makeItems = () => tickers.map(t => `
      <div class="ticker-item">
        <span class="sym">${t.sym}</span>
        <span>$${t.price}</span>
        <span class="${t.up ? 'green' : 'red'}">${t.change}</span>
      </div>`).join('');

    document.getElementById('ticker').innerHTML = makeItems() + makeItems();
  </script>

</body>
</html>
